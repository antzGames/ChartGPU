<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChartGPU</title>
  <meta name="description" content="GPU-accelerated charting library for the modern web. WebGPU-native rendering with interactive examples.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #07080C;
      --bg-surface: #0C0E14;
      --bg-elevated: #12141C;
      --bg-hover: #181B25;

      --border-subtle: rgba(148, 163, 184, 0.06);
      --border-default: rgba(148, 163, 184, 0.10);
      --border-hover: rgba(148, 163, 184, 0.16);

      --text-primary: #E2E5EB;
      --text-secondary: #7A8494;
      --text-tertiary: #454D5C;

      --brand-blue: #3B7DD8;
      --brand-gold: #D4A520;
      --brand-gold-soft: rgba(212, 165, 32, 0.12);

      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Mono', Consolas, monospace;

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --max-width: 1280px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; border: none; background: none; cursor: pointer; color: inherit; }
    img { display: block; max-width: 100%; }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7, 8, 12, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-subtle);
    }

    .header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 48px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-link {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .logo-link img {
      height: 28px;
      width: auto;
    }

    .version-badge {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      padding: 3px 8px;
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    .header-spacer { flex: 1; }

    .header-links {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .header-link:hover {
      color: var(--text-primary);
      background: var(--bg-elevated);
    }

    .header-link svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── Intro ── */
    .intro {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 56px 48px 0;
    }

    .intro-tagline {
      font-family: var(--font-display);
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--text-primary);
    }

    .intro-tagline .gold {
      color: var(--brand-gold);
    }

    .intro-sub {
      margin-top: 12px;
      font-size: 15px;
      color: var(--text-secondary);
      max-width: 540px;
    }

    .install-bar {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 8px;
    }

    .install-prompt {
      color: var(--text-tertiary);
      font-family: var(--font-mono);
      font-size: 13px;
      user-select: none;
    }

    .install-cmd {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-primary);
      letter-spacing: 0.01em;
    }

    .install-copy {
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      border: 1px solid var(--border-default);
      border-radius: 5px;
      transition: all 0.15s;
    }

    .install-copy:hover {
      color: var(--brand-gold);
      border-color: var(--brand-gold-soft);
      background: var(--brand-gold-soft);
    }

    .install-copy.copied {
      color: var(--brand-gold);
      border-color: transparent;
      background: var(--brand-gold-soft);
    }

    /* ── Filters ── */
    .filters {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 48px;
      margin-top: 48px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar { display: none; }

    .filter-tab {
      padding: 10px 16px 12px;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-tertiary);
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .filter-tab:hover {
      color: var(--text-secondary);
    }

    .filter-tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--brand-gold);
    }

    .filter-count {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-left: 4px;
    }

    .filter-tab.active .filter-count {
      color: var(--text-secondary);
    }

    /* ── Gallery ── */
    .gallery {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 32px 48px 80px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      display: flex;
      flex-direction: column;
      padding: 24px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      transition: border-color 0.2s, background 0.2s, transform 0.25s var(--ease-out), opacity 0.3s;
      cursor: pointer;
      position: relative;
    }

    .card:hover {
      border-color: rgba(212, 165, 32, 0.15);
      background: rgba(212, 165, 32, 0.025);
      transform: translateY(-2px);
    }

    .card:focus-visible {
      outline: 2px solid var(--brand-gold);
      outline-offset: 2px;
    }

    .card:active {
      transform: translateY(0);
    }

    .card-category {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      margin-bottom: 10px;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      margin-bottom: 6px;
      transition: color 0.2s;
    }

    .card:hover .card-title {
      color: #fff;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      flex: 1;
    }

    .card-arrow {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 16px;
      height: 16px;
      color: var(--text-tertiary);
      opacity: 0;
      transform: translate(-4px, 4px);
      transition: opacity 0.2s, transform 0.2s var(--ease-out);
    }

    .card:hover .card-arrow {
      opacity: 1;
      transform: translate(0, 0);
    }

    .card.hidden {
      display: none;
    }

    /* ── Viewer overlay ── */
    .viewer {
      position: fixed;
      inset: 0;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s var(--ease-out), visibility 0.25s;
    }

    .viewer.active {
      opacity: 1;
      visibility: visible;
    }

    .viewer-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
    }

    .viewer-panel {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-base);
      transform: scale(0.97);
      transition: transform 0.25s var(--ease-out);
    }

    .viewer.active .viewer-panel {
      transform: scale(1);
    }

    .viewer-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      height: 52px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .viewer-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .viewer-back:hover {
      color: var(--text-primary);
      background: var(--bg-elevated);
    }

    .viewer-back svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .viewer-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .viewer-category {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      padding: 3px 8px;
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
    }

    .viewer-spacer { flex: 1; }

    .viewer-esc {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      padding: 3px 7px;
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      margin-right: 8px;
    }

    .viewer-newtab {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .viewer-newtab:hover {
      color: var(--text-primary);
      background: var(--bg-elevated);
    }

    .viewer-newtab svg {
      width: 13px;
      height: 13px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .viewer-iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: var(--bg-base);
    }

    /* ── Footer ── */
    .footer {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 48px 40px;
      font-size: 12px;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer a {
      color: var(--text-secondary);
      transition: color 0.15s;
    }

    .footer a:hover {
      color: var(--brand-gold);
    }

    .footer-dot {
      margin: 0 4px;
    }

    /* ── Entrance animation ── */
    @media (prefers-reduced-motion: no-preference) {
      .animate-in {
        opacity: 0;
        transform: translateY(10px);
        animation: fadeInUp 0.6s var(--ease-out) forwards;
      }

      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    }

    /* ── Responsive ── */
    @media (max-width: 960px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 700px) {
      .header-inner {
        padding: 0 20px;
        gap: 12px;
      }

      .header-link span { display: none; }

      .intro {
        padding: 40px 20px 0;
      }

      .intro-sub {
        font-size: 14px;
      }

      .install-bar {
        width: 100%;
        justify-content: space-between;
      }

      .filters {
        padding: 0 20px;
        margin-top: 36px;
      }

      .gallery {
        padding: 24px 20px 64px;
      }

      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .footer {
        padding: 0 20px 32px;
      }
    }

    @media (max-width: 480px) {
      .install-bar {
        flex-wrap: wrap;
        gap: 8px;
      }

      .install-prompt { display: none; }

      .install-cmd { font-size: 12px; }

      .version-badge { display: none; }

      .viewer-category,
      .viewer-esc { display: none; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo-link">
        <img src="../docs/assets/chartgpu.png" alt="ChartGPU" height="28">
      </a>
      <span class="version-badge">v0.3.2</span>
      <div class="header-spacer"></div>
      <div class="header-links">
        <a href="https://www.npmjs.com/package/@chartgpu/chartgpu" class="header-link" target="_blank" rel="noopener">
          <svg viewBox="0 0 16 16"><path d="M0 0v16h16V0H0zm13 13H8V5h2.5v5.5H13V3H3v10z"/></svg>
          <span>npm</span>
        </a>
        <a href="https://github.com/ChartGPU/ChartGPU" class="header-link" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
          <span>GitHub</span>
        </a>
      </div>
    </div>
  </header>

  <section class="intro">
    <h1 class="intro-tagline animate-in">GPU-accelerated charts for the <span class="gold">modern web</span></h1>
    <p class="intro-sub animate-in" style="animation-delay: 60ms">WebGPU-native rendering. Million-point datasets at 60fps. MIT licensed.</p>
    <div class="install-bar animate-in" style="animation-delay: 120ms">
      <span class="install-prompt">$</span>
      <code class="install-cmd">npm install @chartgpu/chartgpu</code>
      <button class="install-copy" id="copyBtn" aria-label="Copy install command">Copy</button>
    </div>
  </section>

  <nav class="filters animate-in" style="animation-delay: 180ms" id="filters" role="tablist" aria-label="Filter examples by category">
  </nav>

  <section class="gallery">
    <div class="gallery-grid" id="gallery">
    </div>
  </section>

  <footer class="footer">
    <span>ChartGPU v0.3.2</span>
    <span class="footer-dot">&middot;</span>
    <span>MIT License</span>
    <span class="footer-dot">&middot;</span>
    <a href="https://github.com/ChartGPU/ChartGPU" target="_blank" rel="noopener">GitHub</a>
    <span class="footer-dot">&middot;</span>
    <a href="https://www.npmjs.com/package/@chartgpu/chartgpu" target="_blank" rel="noopener">npm</a>
  </footer>

  <div class="viewer" id="viewer" aria-hidden="true">
    <div class="viewer-backdrop" id="viewerBackdrop"></div>
    <div class="viewer-panel">
      <div class="viewer-header">
        <button class="viewer-back" id="viewerBack">
          <svg viewBox="0 0 14 14"><polyline points="9 2 4 7 9 12"/></svg>
          Back
        </button>
        <span class="viewer-title" id="viewerTitle"></span>
        <span class="viewer-category" id="viewerCategory"></span>
        <div class="viewer-spacer"></div>
        <span class="viewer-esc">Esc</span>
        <a class="viewer-newtab" id="viewerNewTab" target="_blank" rel="noopener">
          Open
          <svg viewBox="0 0 14 14"><polyline points="6 2 12 2 12 8"/><line x1="12" y1="2" x2="5" y2="9"/></svg>
        </a>
      </div>
      <iframe class="viewer-iframe" id="viewerIframe" title="Example preview" loading="lazy"></iframe>
    </div>
  </div>

  <script>
    const examples = [
      { id: 'streaming-dashboard', title: 'Streaming Dashboard', desc: 'Five-chart APM dashboard with live latency percentiles, throughput, and real-time annotations', category: 'streaming', path: '/examples/streaming-dashboard/index.html' },
      { id: 'candlestick-streaming', title: 'Candlestick Streaming', desc: 'Crypto trading terminal with live tick simulation and real-time candle aggregation', category: 'streaming', path: '/examples/candlestick-streaming/index.html' },
      { id: 'scatter-density-1m', title: 'Scatter Density 1M', desc: 'One million points rendered as a GPU-binned density heatmap with colormap controls', category: 'performance', path: '/examples/scatter-density-1m/index.html' },
      { id: 'basic-line', title: 'Basic Line', desc: 'Sine wave line chart with grid, axes, and tooltip interaction', category: 'series', path: '/examples/basic-line/index.html' },
      { id: 'candlestick', title: 'Candlestick', desc: 'Financial OHLC chart with classic and hollow style toggle', category: 'series', path: '/examples/candlestick/index.html' },
      { id: 'scatter', title: 'Scatter Plot', desc: 'Fixed size, per-point size, and dynamic size function variants', category: 'series', path: '/examples/scatter/index.html' },
      { id: 'grouped-bar', title: 'Grouped & Stacked Bar', desc: 'Clustered bars with stacking, custom widths, and negative values', category: 'series', path: '/examples/grouped-bar/index.html' },
      { id: 'pie', title: 'Pie & Donut', desc: 'Pie chart and donut chart with per-slice colors', category: 'series', path: '/examples/pie/index.html' },
      { id: 'live-streaming', title: 'Live Streaming', desc: 'Streaming appendData with autoScroll toggle and dataZoom slider', category: 'streaming', path: '/examples/live-streaming/index.html' },
      { id: 'million-points', title: 'Million Points', desc: '1M point benchmark with sampling toggle and FPS comparison', category: 'performance', path: '/examples/million-points/index.html' },
      { id: 'ultimate-benchmark', title: 'Ultimate Benchmark', desc: 'Multi-series stress test with FPS, frame-time metrics, and streaming append', category: 'performance', path: '/examples/ultimate-benchmark/index.html' },
      { id: 'sampling', title: 'Zoom-Aware Sampling', desc: 'Zoom in for detail, zoom out for performance with debounced re-sampling', category: 'performance', path: '/examples/sampling/index.html' },
      { id: 'interactive', title: 'Interactive', desc: 'Synced crosshair and axis tooltip across two stacked charts with click logging', category: 'interaction', path: '/examples/interactive/index.html' },
      { id: 'chart-sync', title: 'Chart Sync', desc: 'Two charts with synced crosshair position and axis tooltip values', category: 'interaction', path: '/examples/chart-sync/index.html' },
      { id: 'annotation-authoring', title: 'Annotations', desc: 'Reference lines, point markers, text annotations with authoring and JSON export', category: 'interaction', path: '/examples/annotation-authoring/index.html' },
      { id: 'exchange-gaps', title: 'Exchange Gaps', desc: 'Null gap entries for maintenance windows with connectNulls toggle', category: 'interaction', path: '/examples/exchange-gaps/index.html' },
      { id: 'data-update-animation', title: 'Data Update Animation', desc: 'Animated transitions for y-values, scales, and pie slice angles', category: 'animation', path: '/examples/data-update-animation/index.html' },
      { id: 'multi-series-animation', title: 'Multi-Series Animation', desc: 'Line, bar, scatter, and area series animating together on data update', category: 'animation', path: '/examples/multi-series-animation/index.html' },
      { id: 'tick-formatter', title: 'Custom Tick Formatter', desc: 'Percentage, duration, locale time, and integer-only formatting', category: 'config', path: '/examples/tick-formatter/index.html' },
      { id: 'external-render-mode', title: 'External Render Mode', desc: 'Application-controlled rendering with shared rAF loop and mode switching', category: 'config', path: '/examples/external-render-mode/index.html' },
      { id: 'cartesian-data-formats', title: 'Data Formats', desc: 'XYArraysData, InterleavedXYData, and array-of-objects with 100k points', category: 'config', path: '/examples/cartesian-data-formats/index.html' },
      { id: 'grid-test', title: 'Grid Renderer', desc: 'Configurable grid line counts for horizontal and vertical axes', category: 'config', path: '/examples/grid-test/index.html' },
      { id: 'hello-world', title: 'Hello World', desc: 'Raw WebGPU clear color cycling through the color spectrum', category: 'config', path: '/examples/hello-world/index.html' },
    ];

    const categories = [
      { id: 'all', label: 'All' },
      { id: 'series', label: 'Series' },
      { id: 'streaming', label: 'Streaming' },
      { id: 'performance', label: 'Performance' },
      { id: 'interaction', label: 'Interaction' },
      { id: 'animation', label: 'Animation' },
      { id: 'config', label: 'Configuration' },
    ];

    const categoryLabels = {
      series: 'Series',
      streaming: 'Streaming',
      performance: 'Performance',
      interaction: 'Interaction',
      animation: 'Animation',
      config: 'Configuration',
    };

    const filtersEl = document.getElementById('filters');
    const galleryEl = document.getElementById('gallery');
    const viewerEl = document.getElementById('viewer');
    const viewerIframe = document.getElementById('viewerIframe');
    const viewerTitle = document.getElementById('viewerTitle');
    const viewerCategory = document.getElementById('viewerCategory');
    const viewerNewTab = document.getElementById('viewerNewTab');
    const copyBtn = document.getElementById('copyBtn');

    let activeCategory = 'all';

    // ── Filters ──
    categories.forEach(cat => {
      const count = cat.id === 'all' ? examples.length : examples.filter(e => e.category === cat.id).length;
      const btn = document.createElement('button');
      btn.className = 'filter-tab' + (cat.id === 'all' ? ' active' : '');
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', cat.id === 'all' ? 'true' : 'false');
      btn.dataset.category = cat.id;
      btn.innerHTML = `${cat.label}<span class="filter-count">${count}</span>`;
      btn.addEventListener('click', () => setFilter(cat.id));
      filtersEl.appendChild(btn);
    });

    function setFilter(catId) {
      activeCategory = catId;
      filtersEl.querySelectorAll('.filter-tab').forEach(tab => {
        const isActive = tab.dataset.category === catId;
        tab.classList.toggle('active', isActive);
        tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
      });
      renderGallery();
    }

    // ── Gallery ──
    function renderGallery() {
      const filtered = activeCategory === 'all' ? examples : examples.filter(e => e.category === activeCategory);
      const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      galleryEl.innerHTML = '';
      filtered.forEach((ex, i) => {
        const card = document.createElement('a');
        card.href = ex.path;
        card.className = 'card';
        if (!reducedMotion) {
          card.classList.add('animate-in');
          card.style.animationDelay = `${240 + i * 40}ms`;
        }
        card.dataset.id = ex.id;
        card.innerHTML = `
          <span class="card-category">${categoryLabels[ex.category]}</span>
          <h3 class="card-title">${ex.title}</h3>
          <p class="card-desc">${ex.desc}</p>
          <svg class="card-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="13" x2="13" y2="3"/><polyline points="6 3 13 3 13 10"/>
          </svg>
        `;
        card.addEventListener('click', e => {
          e.preventDefault();
          openViewer(ex);
        });
        galleryEl.appendChild(card);
      });
    }

    // ── Viewer ──
    function openViewer(ex) {
      viewerTitle.textContent = ex.title;
      viewerCategory.textContent = categoryLabels[ex.category];
      viewerNewTab.href = ex.path;
      viewerIframe.src = ex.path;
      viewerEl.classList.add('active');
      viewerEl.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeViewer() {
      viewerEl.classList.remove('active');
      viewerEl.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      setTimeout(() => { viewerIframe.src = 'about:blank'; }, 250);
    }

    document.getElementById('viewerBack').addEventListener('click', closeViewer);
    document.getElementById('viewerBackdrop').addEventListener('click', closeViewer);

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && viewerEl.classList.contains('active')) {
        closeViewer();
      }
    });

    // ── Copy ──
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText('npm install @chartgpu/chartgpu');
        copyBtn.textContent = 'Copied';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 2000);
      } catch {
        copyBtn.textContent = 'Failed';
        setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
      }
    });

    // ── Init ──
    renderGallery();
  </script>
</body>
</html>
